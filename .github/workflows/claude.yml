name: Claude Code

on:
  issues:
    types: [opened, assigned]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  workflow_run:
    workflows: [pr]
    types: [completed]

jobs:
  kick-claude:
    if: |
      github.actor == github.repository_owner && (
        (github.event_name == 'issues' && (contains(toLower(github.event.issue.body), '@claude') || contains(toLower(github.event.issue.title), '@claude'))) ||
        (github.event_name == 'issue_comment' && contains(toLower(github.event.comment.body), '@claude')) ||
        (github.event_name == 'pull_request_review_comment' && contains(toLower(github.event.comment.body), '@claude')) ||
        (github.event_name == 'pull_request_review' && contains(toLower(github.event.review.body), '@claude'))
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 1
      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read

          # Optional: Give a custom prompt to Claude. If this is not specified, Claude will perform the instructions specified in the comment that tagged it.
          # prompt: 'Update the pull request description to include a summary of changes.'

          # Optional: Add claude_args to customize behavior and configuration
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options
          # claude_args: '--allowed-tools Bash(gh pr *)'

  fix-ci-failure:
    if: |
      github.event_name == 'workflow_run' &&
      github.event.workflow_run.conclusion == 'failure' &&
      github.event.workflow_run.actor.login == github.repository_owner &&
      !contains(github.event.workflow_run.head_commit.message, '[claude-ci-fix]')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
      issues: read
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          fetch-depth: 1

      - name: Run Claude Code to fix CI failure
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          additional_permissions: |
            actions: read

          prompt: |
            The CI workflow run https://github.com/${{ github.repository }}/actions/runs/${{ github.event.workflow_run.id }}
            failed on branch `${{ github.event.workflow_run.head_branch }}`.
            Inspect the failed job logs with `gh run view ${{ github.event.workflow_run.id }} --log-failed`,
            fix the underlying issue, then commit and push the fix to this branch.
            The commit message must include the exact string `[claude-ci-fix]` so this is not retried
            more than once for the same failure.

          claude_args: '--allowed-tools "Bash(gh run view:*)"'
